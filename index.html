<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ZEN ATTAQ — music, albums and original soundtracks."
    />
    <meta name="theme-color" content="#060908" />
    <title>ZEN ATTAQ — Discography</title>
    <link rel="icon" href="assets/favicon-a.svg?v=2" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <header class="site-header">
      <a class="identity" href="#top" aria-label="ZEN ATTAQ — home">
        <span class="identity__name title-font">ZEN ATTAQ</span>
      </a>

    </header>

    <main id="top">
      <section class="intro" aria-labelledby="page-title">
        <p class="eyebrow">Selected works / 2018—2026</p>
        <h1 id="page-title" class="title-font">Music from places that never existed.</h1>
      </section>

      <section class="releases" id="releases" aria-labelledby="releases-title">
        <div class="section-heading">
          <h2 id="releases-title">Discography</h2>
          <p>03 releases</p>
        </div>

        <div class="release-grid">
          <a
            class="release-card"
            href="releases/space-is-the-ocean.html"
            style="--accent: #70d7dc"
            aria-label="Space Is the Ocean, 2018"
          >
            <figure class="release-card__art" data-tilt-card>
              <img
                src="assets/covers/space-is-the-ocean.jpg"
                alt="Space Is the Ocean album cover"
                width="1600"
                height="1600"
              />
              <span class="release-card__index">01</span>
              <span class="release-card__open" aria-hidden="true">↗</span>
            </figure>
            <div class="release-card__info">
              <div>
                <h3 class="title-font">Space Is the Ocean</h3>
                <p>Album</p>
              </div>
              <time datetime="2018">2018</time>
            </div>
          </a>

          <a
            class="release-card"
            href="releases/dreamer.html"
            style="--accent: #ff7a44"
            aria-label="Dreamer, 2021"
          >
            <figure class="release-card__art" data-tilt-card>
              <img
                src="assets/covers/dreamer.jpg"
                alt="Dreamer album cover"
                width="1600"
                height="1600"
              />
              <span class="release-card__index">02</span>
              <span class="release-card__open" aria-hidden="true">↗</span>
            </figure>
            <div class="release-card__info">
              <div>
                <h3 class="title-font">Dreamer</h3>
                <p>Mini album</p>
              </div>
              <time datetime="2021">2021</time>
            </div>
          </a>

          <a
            class="release-card release-card--upcoming"
            href="releases/metamorphose.html"
            style="--accent: #43ffd5"
            aria-label="Metamorphose, coming soon in 2026"
          >
            <figure class="release-card__art" data-tilt-card>
              <img
                src="assets/covers/metamorphose.png"
                alt="Metamorphose album cover"
                width="1600"
                height="1600"
              />
              <span class="release-card__index">03</span>
              <span class="release-card__open" aria-hidden="true">↗</span>
              <span class="release-card__status">Coming soon</span>
            </figure>
            <div class="release-card__info">
              <div>
                <h3 class="title-font">Metamorphose</h3>
                <p>Album</p>
              </div>
              <time datetime="2026">2026</time>
            </div>
          </a>

        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p class="title-font">ZEN ATTAQ</p>
      <p>© <span data-current-year>2026</span> / All sounds reserved</p>
      <a class="site-footer__lab" href="https://attaqlab.com" target="_blank" rel="noreferrer">
        <strong>ATTAQ LAB</strong>
        <span>Software for creatives</span>
      </a>
      <div class="site-footer__bandcamp">
        <span aria-hidden="true">Bandcamp</span>
        <iframe
          title="Follow ZEN ATTAQ on Bandcamp"
          scrolling="no"
          style="border: 0; width: 100%; height: 50px"
          src="https://bandcamp.com/band_follow_button_deluxe/3474102071"
        ></iframe>
      </div>
    </footer>
  </body>
</html>
